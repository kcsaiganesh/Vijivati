name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@62f4f872db3836360b72999f4b87f1ff13310f3a
        with:
          region: us-east-1

      - name: Build, tag, and push Docker image to Amazon ECR
        env:
          REGISTRY: 847795003432.dkr.ecr.us-east-1.amazonaws.com
          REPOSITORY: vijivati-web
          IMAGE_TAG: latest
        run: |
          docker build -t vijivati-web .
          docker tag vijivati-web:latest 847795003432.dkr.ecr.us-east-1.amazonaws.com/vijivati-web:latest
          docker push 847795003432.dkr.ecr.us-east-1.amazonaws.com/vijivati-web:latest
