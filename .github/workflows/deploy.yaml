name: Deploy to AWS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::123456789012:role/my-github-actions-role
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to Amazon ECR
        env:
          REGISTRY: 847795003432.dkr.ecr.us-east-1.amazonaws.com
          REPOSITORY: vijivati-web
          IMAGE_TAG: latest
        run: |
          docker build -t vijivati-web .
          docker tag vijivati-web:latest 847795003432.dkr.ecr.us-east-1.amazonaws.com/vijivati-web:latest
          docker push 847795003432.dkr.ecr.us-east-1.amazonaws.com/vijivati-web:latest
